[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  DATABASE_URL = "file:./prisma/dev.db"
  ADMIN_PASSWORD = "admin"
  SESSION_SECRET = "un-secret-tres-long-et-aleatoire-minimum-32-chars"
  NEXT_PUBLIC_SITE_URL = "https://newappai.netlify.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"
